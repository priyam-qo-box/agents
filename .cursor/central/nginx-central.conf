# Nginx template for the Sunny fleet collector. ${CENTRAL_DOMAIN} is substituted
# by nginx:alpine's envsubst at container start (it reads /etc/nginx/templates/*).
# Only ${CENTRAL_DOMAIN} is in the environment, so Nginx runtime vars like $host
# and $scheme are left untouched.
#
# IMPORTANT: the HTTPS server block below references the Let's Encrypt cert files.
# Nginx will NOT start if those files are missing — so the cert MUST be issued
# BEFORE `docker compose up` (cert-first). The Fleet Host Agent (Hari) and the
# README both do this: run standalone Certbot on port 80 first, then start the
# stack. For a temporary TLS-less board (DNS/cert not ready yet), run the
# collector directly on port 80 instead of this Nginx (see fleet-host-agent.md).
#
# This file is included within Nginx's http{} context (conf.d), so http-scoped
# directives (limit_req_zone, map) are valid here.

# ---- Abuse protection: rate-limit write/API traffic per client IP ------------
limit_req_zone $binary_remote_addr zone=fleet_api:10m rate=10r/s;
limit_req_status 429;

# ---- HTTP: ACME challenge + redirect to HTTPS -------------------------------
server {
    listen 80;
    server_name ${CENTRAL_DOMAIN};
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    # Until the cert is issued you can comment the redirect to serve over HTTP.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: fleet dashboard + collector API --------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name ${CENTRAL_DOMAIN};
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/${CENTRAL_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${CENTRAL_DOMAIN}/privkey.pem;

    # Modern TLS (Mozilla "intermediate"): TLS 1.2/1.3, strong ciphers only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (Let's Encrypt supports it).
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/${CENTRAL_DOMAIN}/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers (applied to all responses, including errors).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # The dashboard is a self-contained first-party page with inline <script>/<style>
    # and no external origins, so inline is allowed but every source is locked to 'self'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;
    client_max_body_size 2m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    gzip on;
    gzip_types application/json text/css application/javascript text/plain;
    gzip_min_length 512;

    # Optional: make the whole fleet view private (uncomment + create htpasswd):
    #   docker compose exec nginx sh -c "apk add apache2-utils && htpasswd -bc /etc/letsencrypt/htpasswd user pass"
    # auth_basic "Sunny Fleet";
    # auth_basic_user_file /etc/letsencrypt/htpasswd;

    location / {
        limit_req zone=fleet_api burst=20 nodelay;
        proxy_pass http://collector:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_no_cache 1;
        add_header Cache-Control "no-store" always;
    }
}
