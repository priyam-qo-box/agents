# Minimal static server for the early progress publisher.
# progress.json must never be cached so the dashboard always sees the latest state.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Default landing -> the dashboard.
    location = / {
        return 302 /agentprogress.html;
    }

    location = /progress.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files /progress.json =404;
    }

    location = /agentprogress.html {
        add_header Cache-Control "no-cache" always;
        try_files /agentprogress.html =404;
    }

    # Everything else is denied — this publisher only exposes the dashboard.
    location / {
        return 404;
    }
}
