# Early progress publisher for the Sunny pipeline.
#
# Serves the live agent-progress dashboard from the very first agent, BEFORE the
# Nginx & SSL stage (Naveen) exists. It only serves static files from .sunny/web
# (read-only) — it never touches the generated backend.
#
# Maya (context-agent) copies this file + agentprogress.html into .sunny/web/ at
# intake and writes/updates progress.json on every handoff. Sunny starts it once
# in Phase 0:
#
#   docker compose -f .sunny/web/docker-compose.yml up -d
#   # then open  http://<server-ip>:8787/agentprogress.html
#
# Override the port if 8787 is taken:  PROGRESS_PORT=9090 docker compose ... up -d
#
# At Stage 5 Naveen serves the same files at https://<domain>/agentprogress.html
# and Sunny stops this publisher so the port is free for Certbot/Nginx:
#
#   docker compose -f .sunny/web/docker-compose.yml down
#
# No-Docker fallback (equivalent):
#   python -m http.server 8787 --directory .sunny/web

services:
  progress:
    image: nginx:alpine
    container_name: sunny-progress
    restart: unless-stopped
    ports:
      - "${PROGRESS_PORT:-8787}:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx-progress.conf:/etc/nginx/conf.d/default.conf:ro
