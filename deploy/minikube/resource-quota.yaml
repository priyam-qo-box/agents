apiVersion: v1
kind: ResourceQuota
metadata:
  name: sunny-prod-quota
  namespace: sunny-prod
spec:
  hard:
    pods: "20"
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "12"
    limits.memory: 24Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: sunny-prod-limits
  namespace: sunny-prod
spec:
  limits:
    - default:
        cpu: 500m
        memory: 768Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      type: Container
